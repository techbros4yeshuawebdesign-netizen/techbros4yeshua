<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Tech Bros for Yeshua</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{background:#080a04;}
body{font-family:'DM Sans',sans-serif;background:#080a04;color:#fff;min-height:100vh;-webkit-font-smoothing:antialiased;}
:root{--lime:#c8f135;--mid:rgba(255,255,255,0.45);--card:rgba(20,22,12,0.95);--border:rgba(255,255,255,0.08);}

#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.auth-box{background:#111408;border:1.5px solid rgba(200,241,53,0.2);border-radius:20px;padding:40px;width:100%;max-width:380px;}
.logo{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;margin-bottom:4px;}
.logo span{color:var(--lime);}
.sub{font-size:13px;color:var(--mid);margin-bottom:28px;}
.f-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.f-group label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.3);}
.f-group input{background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.09);border-radius:10px;padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:15px;color:#fff;outline:none;width:100%;}
.f-group input:focus{border-color:var(--lime);}
.f-group input::placeholder{color:rgba(255,255,255,0.2);}
.lime-btn{width:100%;padding:13px;background:var(--lime);color:#080a04;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;border:none;border-radius:100px;cursor:pointer;}
.msg{font-size:13px;padding:9px 14px;border-radius:8px;display:none;text-align:center;margin-bottom:12px;}
.msg.error{background:rgba(220,50,50,0.14);color:#ff8080;display:block;}

#admin-screen{display:none;}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:#0d0f06;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
.top-logo{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;}
.top-logo span{color:var(--lime);}
.signout{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:rgba(255,255,255,0.5);padding:7px 16px;border-radius:100px;font-size:12px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;}
.signout:hover{border-color:var(--lime);color:var(--lime);}

.admin-body{max-width:1100px;margin:0 auto;padding:32px;}
.section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:22px;margin-bottom:16px;margin-top:32px;}
.section-title:first-child{margin-top:0;}
.label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--lime);margin-bottom:12px;}

.req-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:10px;}
.req-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
.req-type{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;}
.req-meta{font-size:12px;color:var(--mid);word-break:break-word;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:600px;}
.req-msg{font-size:13px;color:rgba(255,255,255,0.6);line-height:1.5;margin-top:6px;word-break:break-word;white-space:pre-wrap;max-height:120px;overflow-y:auto;}
.req-date{font-size:11px;color:rgba(255,255,255,0.2);margin-top:8px;}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:3px 10px;border-radius:100px;}
.badge.pending{background:rgba(255,180,0,0.12);color:#ffb400;}
.badge.done{background:rgba(80,200,80,0.12);color:#6dc86d;}
.badge.new{background:rgba(200,241,53,0.12);color:var(--lime);}
.badge-dot{width:4px;height:4px;border-radius:50%;background:currentColor;}

.mark-done{padding:5px 14px;border-radius:100px;font-size:11px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;border:1px solid rgba(200,241,53,0.3);background:rgba(200,241,53,0.06);color:var(--lime);transition:all 0.2s;}
.mark-done:hover{background:rgba(200,241,53,0.15);}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;}
.stat-num{font-family:'Syne',sans-serif;font-weight:700;font-size:28px;color:var(--lime);}
.stat-lbl{font-size:12px;color:var(--mid);margin-top:3px;}

.empty{text-align:center;padding:40px;color:var(--mid);font-size:14px;}
.loading{text-align:center;padding:40px;color:var(--mid);}

.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px;}
.tab{padding:11px 20px;font-family:'Syne',sans-serif;font-weight:600;font-size:13px;color:rgba(255,255,255,0.35);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;transition:all 0.2s;}
.tab.active{color:var(--lime);border-bottom-color:var(--lime);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

@media(max-width:600px){.admin-body{padding:20px;}.top-bar{padding:12px 18px;}}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="logo">Tech Bros for <span>Yeshua</span></div>
    <div class="sub">Admin dashboard — Nathan only</div>
    <div id="auth-msg" class="msg"></div>
    <div class="f-group"><label>Email</label><input type="email" id="a-email" placeholder="techBros4yeshua.web.design@gmail.com"></div>
    <div class="f-group"><label>Password</label><input type="password" id="a-pass" placeholder="••••••••"></div>
    <button class="lime-btn" onclick="doLogin()">Sign In →</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <div class="top-bar">
    <div class="top-logo">Tech Bros for <span>Yeshua</span> — Admin</div>
    <button class="signout" onclick="doSignout()">Sign Out</button>
  </div>
  <div class="admin-body">

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat"><div class="stat-num" id="s-contacts">—</div><div class="stat-lbl">Prototype Requests</div></div>
      <div class="stat"><div class="stat-num" id="s-clients">—</div><div class="stat-lbl">Clients</div></div>
      <div class="stat"><div class="stat-num" id="s-pending">—</div><div class="stat-lbl">Pending Requests</div></div>
      <div class="stat"><div class="stat-num" id="s-sites">—</div><div class="stat-lbl">Active Sites</div></div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="showTab('contacts')">Prototype Requests</button>
      <button class="tab" onclick="showTab('edit-requests')">Edit Requests</button>
      <button class="tab" onclick="showTab('clients')">Clients</button>
    </div>

    <!-- PROTOTYPE REQUESTS -->
    <div id="tab-contacts" class="tab-panel active">
      <div class="label">New Website / Prototype Requests</div>
      <div id="contacts-list"><div class="loading">Loading...</div></div>
    </div>

    <!-- EDIT REQUESTS -->
    <div id="tab-edit-requests" class="tab-panel">
      <div class="label">Client Edit & Website Requests</div>
      <div id="edit-list"><div class="loading">Loading...</div></div>
    </div>

    <!-- CLIENTS -->
    <div id="tab-clients" class="tab-panel">
      <div class="label">All Clients</div>
      <div id="clients-list"><div class="loading">Loading...</div></div>
    </div>

  </div>
</div>

<script>
const sb = supabase.createClient(
  'https://xwnndxatiddupkxcklbz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3bm5keGF0aWRkdXBreGNrbGJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMTIwNTAsImV4cCI6MjA5NDc4ODA1MH0.jFh--OnV9_ihfkm0bVs9gb1GJP2vn5iqV1_5McTbHPs'
);

function showMsg(txt, type) { const e=document.getElementById('auth-msg'); e.textContent=txt; e.className='msg '+type; }

async function doLogin() {
  const email=document.getElementById('a-email').value.trim();
  const pass=document.getElementById('a-pass').value;
  if(!email||!pass){showMsg('Enter your email and password.','error');return;}
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){showMsg(error.message,'error');}
  else loadAdmin();
}

async function doSignout() {
  await sb.auth.signOut();
  document.getElementById('admin-screen').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
}

function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  const tabs=['contacts','edit-requests','clients'];
  const idx=tabs.indexOf(name);
  if(idx>-1) document.querySelectorAll('.tab')[idx].classList.add('active');
}

function fmt(d) { return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'}); }

async function loadAdmin() {
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('admin-screen').style.display='block';
  await Promise.all([loadContacts(), loadEditRequests(), loadClients()]);
  setupRealtime();
}

async function loadContacts() {
  const {data}=await sb.from('contact_requests').select('*').order('created_at',{ascending:false});
  document.getElementById('s-contacts').textContent=data?.length||0;
  const c=document.getElementById('contacts-list');
  if(!data||!data.length){c.innerHTML='<div class="empty">No prototype requests yet.</div>';return;}
  c.innerHTML=data.map(r=>`
    <div class="req-card">
      <div class="req-top">
        <div>
          <div class="req-type">${r.business||'—'}</div>
          <div class="req-meta">👤 ${r.first_name||''} ${r.last_name||''} &nbsp;·&nbsp; 📧 <a href="mailto:${r.email}" style="color:var(--lime);text-decoration:none;">${r.email}</a>${r.phone?' &nbsp;·&nbsp; 📞 '+r.phone:''}</div>
        </div>
        <span class="badge new"><span class="badge-dot"></span>${r.plan||'Not sure'}</span>
      </div>
      ${r.message?`<div class="req-msg">${r.message}</div>`:''}
      <div class="req-date">${fmt(r.created_at)}</div>
    </div>`).join('');
}

async function loadEditRequests() {
  const {data}=await sb.from('edit_requests').select('*, profiles(email,full_name)').order('created_at',{ascending:false});
  const pending=data?.filter(r=>r.status==='pending')||[];
  document.getElementById('s-pending').textContent=pending.length;
  const c=document.getElementById('edit-list');
  if(!data||!data.length){c.innerHTML='<div class="empty">No edit requests yet.</div>';return;}
  c.innerHTML=data.map(r=>`
    <div class="req-card" id="req-${r.id}">
      <div class="req-top">
        <div>
          <div class="req-type">${r.edit_type||'Edit Request'}</div>
          <div class="req-meta">👤 ${r.profiles?.full_name||'Client'} &nbsp;·&nbsp; 📧 ${r.profiles?.email||'—'} &nbsp;·&nbsp; 📄 ${r.page||'—'}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="badge ${r.status==='done'?'done':'pending'}"><span class="badge-dot"></span>${r.status||'pending'}</span>
          ${r.status!=='done'?`<button class="mark-done" onclick="markDone('${r.id}')">Mark Done</button>`:''}
        </div>
      </div>
      <div class="req-msg">${r.message||''}</div>
      <div class="req-date">${fmt(r.created_at)}</div>
    </div>`).join('');
}

async function markDone(id) {
  await sb.from('edit_requests').update({status:'done'}).eq('id',id);
  const card=document.getElementById('req-'+id);
  card.querySelector('.badge').className='badge done';
  card.querySelector('.badge').innerHTML='<span class="badge-dot"></span>done';
  const btn=card.querySelector('.mark-done');
  if(btn){btn.textContent='Undo';btn.onclick=()=>markUndone(id);}
  document.getElementById('s-pending').textContent=document.querySelectorAll('.badge.pending').length;
}

async function markUndone(id) {
  await sb.from('edit_requests').update({status:'pending'}).eq('id',id);
  const card=document.getElementById('req-'+id);
  card.querySelector('.badge').className='badge pending';
  card.querySelector('.badge').innerHTML='<span class="badge-dot"></span>pending';
  const btn=card.querySelector('.mark-done');
  if(btn){btn.textContent='Mark Done';btn.onclick=()=>markDone(id);}
  document.getElementById('s-pending').textContent=document.querySelectorAll('.badge.pending').length;
}

async function loadClients() {
  const {data}=await sb.from('profiles').select('*, sites(count), subscriptions(plan,status)').order('created_at',{ascending:false});
  const {data:sites}=await sb.from('sites').select('count');
  document.getElementById('s-clients').textContent=data?.length||0;
  document.getElementById('s-sites').textContent=sites?.[0]?.count||0;
  const c=document.getElementById('clients-list');
  if(!data||!data.length){c.innerHTML='<div class="empty">No clients yet.</div>';return;}
  c.innerHTML=data.map(r=>`
    <div class="req-card">
      <div class="req-top">
        <div>
          <div class="req-type">${r.full_name||'—'}</div>
          <div class="req-meta">📧 <a href="mailto:${r.email}" style="color:var(--lime);text-decoration:none;">${r.email}</a> &nbsp;·&nbsp; Plan: ${r.subscriptions?.[0]?.plan||'None'}</div>
        </div>
        <span class="badge ${r.status==='active'?'new':'pending'}"><span class="badge-dot"></span>${r.status||'active'}</span>
      </div>
      <div class="req-date">Joined ${fmt(r.created_at)}</div>
    </div>`).join('');
}

sb.auth.getSession().then(({data:{session}})=>{if(session)loadAdmin();});

// ── REAL-TIME UPDATES ──
function setupRealtime() {
  // Watch edit_requests table
  sb.channel('edit-requests-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'edit_requests' }, (payload) => {
      loadEditRequests();
    })
    .subscribe();

  // Watch contact_requests table
  sb.channel('contact-requests-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'contact_requests' }, (payload) => {
      loadContacts();
    })
    .subscribe();

  // Watch profiles table
  sb.channel('profiles-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, (payload) => {
      loadClients();
    })
    .subscribe();
}
</script>
</body>
</html>
