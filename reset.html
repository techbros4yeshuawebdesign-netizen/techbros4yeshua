<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Tech Bros for Yeshua</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{background:#080a04;}
body{font-family:'DM Sans',sans-serif;background:#080a04;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;}
:root{--lime:#c8f135;}
.box{background:rgba(20,22,12,0.95);backdrop-filter:blur(24px);border:1.5px solid rgba(200,241,53,0.2);border-radius:24px;padding:44px 40px;width:100%;max-width:420px;}
.logo{font-family:'Syne',sans-serif;font-weight:700;font-size:19px;margin-bottom:6px;}
.logo span{color:var(--lime);}
.sub{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:28px;}
.f-group{display:flex;flex-direction:column;gap:7px;margin-bottom:16px;}
.f-group label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.3);}
.f-group input{background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.09);border-radius:12px;padding:13px 16px;font-family:'DM Sans',sans-serif;font-size:15px;color:#fff;outline:none;transition:border-color 0.2s;width:100%;}
.f-group input:focus{border-color:var(--lime);}
.f-group input::placeholder{color:rgba(255,255,255,0.2);}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#c8f135,#d8ff45,#c8f135);background-size:200% 200%;animation:charge 3s ease infinite;color:#080a04;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;border:none;border-radius:100px;cursor:pointer;transition:transform 0.2s;}
.btn:hover{transform:scale(1.02);}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;animation:none;}
@keyframes charge{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}
.msg{font-size:13px;padding:10px 14px;border-radius:8px;display:none;text-align:center;margin-bottom:14px;}
.msg.error{background:rgba(220,50,50,0.14);color:#ff8080;display:block;}
.msg.success{background:rgba(200,241,53,0.1);color:var(--lime);display:block;}
.glow-orb{position:fixed;border-radius:50%;filter:blur(90px);opacity:0.12;pointer-events:none;z-index:0;}
.glow-orb:nth-child(1){width:500px;height:500px;background:#c8f135;top:-150px;left:-150px;}
.glow-orb:nth-child(2){width:400px;height:400px;background:#4f9fff;bottom:-100px;right:-100px;}
.box{position:relative;z-index:1;}
</style>
</head>
<body>

<div class="glow-orb"></div>
<div class="glow-orb"></div>

<div class="box">
  <div class="logo">Tech Bros for <span>Yeshua</span></div>
  <div class="sub">Set your new password below</div>

  <div id="loading" style="text-align:center;padding:20px;color:rgba(255,255,255,0.4);">Verifying reset link...</div>

  <div id="form" style="display:none;">
    <div id="msg" class="msg"></div>
    <div class="f-group">
      <label>New Password</label>
      <input type="password" id="new-pass" placeholder="Min. 8 characters">
    </div>
    <div class="f-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm-pass" placeholder="Re-enter new password">
    </div>
    <button class="btn" id="reset-btn" onclick="doReset()">Set New Password →</button>
  </div>

  <div id="success" style="display:none;text-align:center;padding:20px 0;">
    <div style="font-size:48px;margin-bottom:14px;">✅</div>
    <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:20px;margin-bottom:8px;">Password Updated!</div>
    <div style="font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:24px;">You can now sign in with your new password.</div>
    <a href="portal.html" style="background:linear-gradient(135deg,#c8f135,#d8ff45);color:#080a04;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;padding:12px 28px;border-radius:100px;text-decoration:none;display:inline-block;">Go to Sign In →</a>
  </div>

  <div id="invalid" style="display:none;text-align:center;padding:20px 0;">
    <div style="font-size:48px;margin-bottom:14px;">⚠️</div>
    <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:18px;margin-bottom:8px;">Invalid or Expired Link</div>
    <div style="font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:24px;">This reset link has expired. Request a new one.</div>
    <a href="portal.html" style="background:linear-gradient(135deg,#c8f135,#d8ff45);color:#080a04;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;padding:12px 28px;border-radius:100px;text-decoration:none;display:inline-block;">Back to Sign In →</a>
  </div>
</div>

<script>
const sb = supabase.createClient(
  'https://xwnndxatiddupkxcklbz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3bm5keGF0aWRkdXBreGNrbGJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMTIwNTAsImV4cCI6MjA5NDc4ODA1MH0.jFh--OnV9_ihfkm0bVs9gb1GJP2vn5iqV1_5McTbHPs'
);

// Supabase puts the token in the URL hash
async function init() {
  // Handle the auth callback from the reset email
  const { data, error } = await sb.auth.getSession();

  if (data?.session) {
    // Valid session from reset link
    document.getElementById('loading').style.display = 'none';
    document.getElementById('form').style.display = 'block';
  } else {
    // Check URL hash for tokens
    const hash = window.location.hash;
    if (hash && (hash.includes('access_token') || hash.includes('type=recovery'))) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('form').style.display = 'block';
    } else {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('invalid').style.display = 'block';
    }
  }
}

async function doReset() {
  const newPass = document.getElementById('new-pass').value;
  const confirmPass = document.getElementById('confirm-pass').value;
  const msg = document.getElementById('msg');

  if (!newPass || !confirmPass) { msg.textContent = 'Please fill in both fields.'; msg.className = 'msg error'; return; }
  if (newPass.length < 8) { msg.textContent = 'Password must be at least 8 characters.'; msg.className = 'msg error'; return; }
  if (newPass !== confirmPass) { msg.textContent = 'Passwords do not match.'; msg.className = 'msg error'; return; }

  const btn = document.getElementById('reset-btn');
  btn.textContent = 'Updating...'; btn.disabled = true;

  const { error } = await sb.auth.updateUser({ password: newPass });

  if (error) {
    msg.textContent = error.message; msg.className = 'msg error';
    btn.textContent = 'Set New Password →'; btn.disabled = false;
  } else {
    document.getElementById('form').style.display = 'none';
    document.getElementById('success').style.display = 'block';
  }
}

// Listen for auth state change (Supabase fires this when reset link is clicked)
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('form').style.display = 'block';
  }
});

init();
</script>
</body>
</html>
